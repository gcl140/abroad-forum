
    <!-- Search Modal -->
    <div x-show="searchOpen" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-50 overflow-y-auto" 
         @click.away="searchOpen = false">
        
        <!-- Blurred Background -->
        <div class="fixed inset-0 bg-black bg-opacity-70 backdrop-blur-sm"></div>
        
        <!-- Modal Content -->
        <div class="flex items-center justify-center min-h-screen p-4">
            <div x-show="searchOpen"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 scale-95"
                 x-transition:enter-end="opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 scale-100"
                 x-transition:leave-end="opacity-0 scale-95"
                 class="relative w-full max-w-xl">
                
                <!-- Close Button -->
                <button @click="searchOpen = false" 
                        class="absolute -top-12 right-0 text-gray-300 hover:text-white">
                    <i class="fas fa-times text-2xl"></i>
                </button>
                
                <!-- Search Form -->
                <form method="get" action="{% url 'search_content' %}" 
                      class="flex items-center gap-3 bg-gray-900 rounded-full px-4 py-2 border border-gray-700 shadow-xl transform transition-all duration-300 hover:scale-[1.02]">
                    <input 
                        type="text" 
                        name="q" 
                        x-ref="searchInput"
                        x-effect="if(searchOpen) { $nextTick(() => $refs.searchInput.focus()) }"
                        value="{{ query|default:'' }}" 
                        placeholder="Search posts, replies, and notifications..." 
                        class="flex-1 bg-transparent text-white px-4 py-2 text-lg focus:outline-none border-none ring-0"
                        autocomplete="off"
                    >
                    <button type="submit" 
                            class="w-12 h-12 rounded-full bg-maroon flex items-center justify-center text-white hover:bg-maroon-dark transition transform hover:scale-110">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
                
                <!-- Recent Searches (optional) -->
                <div class="mt-4 ml-4 text-sm text-gray-400">
                    <p>Try searching for: 
                    <span class="text-maroon cursor-pointer" @click="$refs.searchInput.value = '{{query}}'; $refs.searchInput.focus()">{{query}}</span>, 
                    <span class="text-maroon cursor-pointer" @click="$refs.searchInput.value = 'Scholarships'; $refs.searchInput.focus()">Scholarships</span>, 
                    <span class="text-maroon cursor-pointer" @click="$refs.searchInput.value = 'VISA'; $refs.searchInput.focus()">VISA</span>
                </p>
                </div>
            </div>
        </div>
    </div>
