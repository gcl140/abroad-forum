<form 
    {% comment %} hx-post="{% url 'add_reply_to_a_reply' child_dict.id %}"          {% endcomment %}
    hx-target="#grandchild-replies-container-{{ child_dict.id }}"
    hx-post="{% if grandchild %}{% url 'add_reply_to_a_reply' grandchild.id %}{% else %}{% url 'add_reply_to_a_reply' child_dict.id %}{% endif %}"         
    {% comment %} hx-target="#grandchild-replies-container-{% if grandchild %}{{ grandchild.id }}{% else %}{{ child_dict.id }}{% endif %}" {% endcomment %}
    hx-swap="{% if grandchild %}beforeend{% else %}afterbegin{% endif %}"
    hx-trigger="submit"
    hx-on::after-request="if(event.detail.successful) { this.reset(); toggleReplyParentForm('{{ child_dict.id }}'); }"
    method="POST"
    enctype="multipart/form-data"
    id="reply-to-a-reply-form-{{ child_dict.id }}"
>
    {% csrf_token %}
    <!-- Main input row -->
    <div class="grid grid-cols-1 gap-2 sm:grid-cols-[1fr_auto] sm:gap-3 w-full">
        <!-- Text input -->
        <input 
            type="text" 
            placeholder="Reply..." 
            name="reply" 
            class="flex-1 bg-gray-800 rounded-full px-4 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-maroon"
        >

        <!-- Attachment buttons -->
        <div class="flex justify-center space-x-4">
            <button type="button" onclick="toggleReplyAttachment('image', {{ child_dict.id }})" class="w-8 h-8 rounded-full bg-gray-700 text-white flex justify-center items-center hover:bg-gray-600 transition">
                <i class="fas fa-image"></i>
            </button>
            <button type="button" onclick="toggleReplyAttachment('video', {{ child_dict.id }})" class="w-8 h-8 rounded-full bg-gray-700 text-white flex justify-center items-center hover:bg-gray-600 transition">
                <i class="fas fa-video"></i>
            </button>
            <button type="button" onclick="toggleReplyAttachment('docs', {{ child_dict.id }})" class="w-8 h-8 rounded-full bg-gray-700 text-white flex justify-center items-center hover:bg-gray-600 transition">
                <i class="fas fa-file-alt"></i>
            </button>
            <button type="button" onclick="toggleReplyAttachment('link', {{ child_dict.id }})" class="w-8 h-8 rounded-full bg-gray-700 text-white flex justify-center items-center hover:bg-gray-600 transition">
                <i class="fas fa-link"></i>
            </button>
            <button 
                type="submit" 
                class="w-8 h-8 rounded-full bg-maroon text-white flex justify-center items-center hover:bg-maroon-dark transition"
            >
                <i class="fas fa-paper-plane text-lg"></i>
            </button>
        </div>
    </div>

    <!-- Attachment sections (initially hidden) -->
    <div id="reply-image-attachment-{{ child_dict.id }}" class="mb-3 hidden mt-2">
        <label class="block">
            <div class="text-xs text-gray-400 mb-1">Upload Image</div>
            <div class="flex items-center gap-2 bg-gray-800 rounded-lg px-3 py-2 cursor-pointer hover:bg-gray-700 transition">
                <i class="fas fa-image text-maroon"></i>
                <span class="text-sm text-gray-300 truncate" id="reply-image-filename-{{ child_dict.id }}">No file selected</span>
                <input type="file" name="image" accept="image/*" class="hidden" id="reply-image-upload-{{ child_dict.id }}">
            </div>
        </label>

    </div>

    <div id="reply-video-attachment-{{ child_dict.id }}" class="mb-3 hidden mt-2">
        <label class="block">
            <div class="text-xs text-gray-400 mb-1">Upload Video</div>
            <div class="flex items-center gap-2 bg-gray-800 rounded-lg px-3 py-2 cursor-pointer hover:bg-gray-700 transition">
                <i class="fas fa-video text-maroon"></i>
                <span class="text-sm text-gray-300 truncate" id="reply-video-filename-{{ child_dict.id }}">No file selected</span>
                <input type="file" name="video" accept="video/*" class="hidden" id="reply-video-upload-{{ child_dict.id }}">
            </div>
        </label>
    </div>

    <div id="reply-docs-attachment-{{ child_dict.id }}" class="mb-3 hidden mt-2">
        <label class="block">
            <div class="text-xs text-gray-400 mb-1">Upload Document</div>
            <div class="flex items-center gap-2 bg-gray-800 rounded-lg px-3 py-2 cursor-pointer hover:bg-gray-700 transition">
                <i class="fas fa-file-alt text-maroon"></i>
                <span class="text-sm text-gray-300 truncate" id="reply-docs-filename-{{ child_dict.id }}">No file selected</span>
                <input type="file" name="docs" accept=".pdf,.doc,.docx,.ppt,.pptx" class="hidden" id="reply-docs-upload-{{ child_dict.id }}">
            </div>
        </label>
    </div>

    <div id="reply-link-attachment-{{ child_dict.id }}" class="mb-3 hidden mt-2">
        <div class="text-xs text-gray-400 mb-1">Attach a link</div>
        <input type="url" name="link" placeholder="https://example.com"
               class="w-full bg-gray-800 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-maroon placeholder-gray-500"
               id="reply-link-input-{{ child_dict.id }}">
    </div>
</form>


<script>
    // Toggle reply attachments for specific post
function toggleReplyAttachment(type, postId) {
    const attachmentTypes = ['image', 'video', 'docs', 'link'];
    
    attachmentTypes.forEach(t => {
        const section = document.getElementById(`reply-${t}-attachment-${postId}`);
        if (!section) return;
        
        const hasValue = 
            (t === 'image' && document.getElementById(`reply-image-upload-${postId}`)?.files.length > 0) ||
            (t === 'video' && document.getElementById(`reply-video-upload-${postId}`)?.files.length > 0) ||
            (t === 'docs' && document.getElementById(`reply-docs-upload-${postId}`)?.files.length > 0) ||
            (t === 'link' && document.getElementById(`reply-link-input-${postId}`)?.value.trim() !== '');

        if (!hasValue && t !== type) {
            section.classList.add('hidden');
        } else {
            section.classList.remove('hidden');
        }
    });
}

// Initialize all reply forms
document.addEventListener("DOMContentLoaded", function() {
    // Find all reply forms (by common attribute)
    document.querySelectorAll('[id^="reply-to-a-reply-form-"]').forEach(form => {
        const postId = form.id.split('-').pop();
        
        // File input handlers
        const setupFileInput = (inputId, labelId, type) => {
            const input = document.getElementById(`${inputId}-${postId}`);
            const label = document.getElementById(`${labelId}-${postId}`);
            
            if (input && label) {
                input.addEventListener("change", function() {
                    const file = input.files[0];
                    label.textContent = file ? file.name : "No file selected";
                    if (file) toggleReplyAttachment(type, postId);
                });
            }
        };
        
        // Setup file inputs
        setupFileInput('reply-image-upload', 'reply-image-filename', 'image');
        setupFileInput('reply-image2-upload', 'reply-image2-filename', 'image');
        setupFileInput('reply-video-upload', 'reply-video-filename', 'video');
        setupFileInput('reply-docs-upload', 'reply-docs-filename', 'docs');
        
        // Link input handler
        const linkInput = document.getElementById(`reply-link-input-${postId}`);
        if (linkInput) {
            linkInput.addEventListener('input', function() {
                toggleReplyAttachment('link', postId);
            });
        }
    });
});
</script>
