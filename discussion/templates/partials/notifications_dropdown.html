<div x-show="open" @click.away="open = false"
     x-transition:enter="transition ease-out duration-150"
     x-transition:enter-start="transform opacity-0 scale-95"
     x-transition:enter-end="transform opacity-100 scale-100"
     x-transition:leave="transition ease-in duration-100"
     x-transition:leave-start="transform opacity-100 scale-100"
     x-transition:leave-end="transform opacity-0 scale-95"
     class="absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-xl border border-[#CBD0D8] z-50 overflow-hidden"
     id="notif-dropdown"
     x-init="$watch('open', v => { if(v) loadNotifications(1) })">

  <!-- Header -->
  <div class="flex items-center justify-between px-4 py-3 border-b border-[#CBD0D8] bg-[#F4F3EA]">
    <span class="font-semibold text-[#333D51] text-sm">Notifications</span>
    <button
      hx-post="{% url 'mark_all_notifications_read' %}"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
      hx-trigger="click"
      hx-swap="none"
      onclick="document.getElementById('unread-count').textContent=''; document.getElementById('unread-count').style.display='none';"
      class="text-xs text-[#D3AC2B] hover:text-[#b89420] font-medium flex items-center gap-1">
      <i class="fas fa-check-double"></i> Mark all read
    </button>
  </div>

  <!-- Loading state -->
  <div id="notif-loading" class="flex items-center justify-center py-8 text-[#687080] text-sm">
    <i class="fas fa-circle-notch fa-spin mr-2"></i> Loading...
  </div>

  <!-- Notification list -->
  <div id="notif-list" class="max-h-72 overflow-y-auto divide-y divide-[#EDE9DF] hidden"></div>

  <!-- See more button -->
  <div id="notif-more-wrap" class="hidden border-t border-[#CBD0D8]">
    <button id="notif-more-btn" onclick="loadMoreNotifications()"
      class="w-full py-2.5 text-xs text-[#D3AC2B] hover:text-[#b89420] font-medium flex items-center justify-center gap-1">
      <i class="fas fa-chevron-down"></i> See more
    </button>
  </div>

  <!-- Empty state -->
  <div id="notif-empty" class="hidden py-10 text-center text-[#687080] text-sm">
    <i class="fas fa-bell-slash text-2xl text-[#CBD0D8] mb-2 block"></i>
    No notifications yet.
  </div>

</div>

{% load static %}
<script src="{% static 'js/notifications_dropdown.js' %}"></script>
