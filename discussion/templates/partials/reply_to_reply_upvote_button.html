{% load static %}
<form 
    hx-post="{% url 'add_reply' post.id %}"         
    hx-target="#replies-container-{{post.id}}"
    hx-swap="afterbegin"
    hx-trigger="submit"
    hx-on::after-request="if(event.detail.successful) this.reset()"
    method="POST"
    enctype="multipart/form-data"
    class="mb-4"
    id="reply-form-{{ post.id }}"
>
    {% csrf_token %}
    
    <!-- Main input row -->
    <div class="grid grid-cols-1 gap-2 sm:grid-cols-[1fr_auto] sm:gap-3 w-full">
        <!-- Text input -->
        <input 
            type="text" 
            placeholder="Reply..." 
            name="reply" 
            class="flex-1 bg-gray-800 rounded-full px-4 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-maroon"
        >

        <!-- Attachment buttons -->
        <div class="flex justify-center space-x-4">
            <button type="button" onclick="toggleReplyAttachment('image', {{ post.id }})" class="w-8 h-8 rounded-full bg-gray-700 text-white flex justify-center items-center hover:bg-gray-600 transition">
                <i class="fas fa-image"></i>
            </button>
            <button type="button" onclick="toggleReplyAttachment('video', {{ post.id }})" class="w-8 h-8 rounded-full bg-gray-700 text-white flex justify-center items-center hover:bg-gray-600 transition">
                <i class="fas fa-video"></i>
            </button>
            <button type="button" onclick="toggleReplyAttachment('docs', {{ post.id }})" class="w-8 h-8 rounded-full bg-gray-700 text-white flex justify-center items-center hover:bg-gray-600 transition">
                <i class="fas fa-file-alt"></i>
            </button>
            <button type="button" onclick="toggleReplyAttachment('link', {{ post.id }})" class="w-8 h-8 rounded-full bg-gray-700 text-white flex justify-center items-center hover:bg-gray-600 transition">
                <i class="fas fa-link"></i>
            </button>
            <button 
                type="submit" 
                class="w-8 h-8 rounded-full bg-maroon text-white flex justify-center items-center hover:bg-maroon-dark transition"
            >
                <i class="fas fa-paper-plane text-sm"></i>
            </button>
        </div>
    </div>

    <!-- Attachment sections (initially hidden) -->
    <div id="reply-image-attachment-{{ post.id }}" class="mb-3 hidden mt-2">
        <label class="block">
            <div class="text-xs text-gray-400 mb-1">Upload Image</div>
            <div class="flex items-center gap-2 bg-gray-800 rounded-lg px-3 py-2 cursor-pointer hover:bg-gray-700 transition">
                <i class="fas fa-image text-maroon"></i>
                <span class="text-sm text-gray-300 truncate" id="reply-image-filename-{{ post.id }}">No file selected</span>
                <input type="file" name="image" accept="image/*" class="hidden" id="reply-image-upload-{{ post.id }}">
            </div>
        </label>

        <label class="block">
            <div class="text-xs text-gray-400 mb-1">Upload Image 2 (Optional)</div>
            <div class="flex items-center gap-2 bg-gray-800 rounded-lg px-3 py-2 cursor-pointer hover:bg-gray-700 transition">
                <i class="fas fa-image text-maroon"></i>
                <span class="text-sm text-gray-300 truncate" id="reply-image2-filename-{{ post.id }}">No file selected</span>
                <input type="file" name="image2" accept="image/*" class="hidden" id="reply-image2-upload-{{ post.id }}">
            </div>
        </label>
    </div>

    <div id="reply-video-attachment-{{ post.id }}" class="mb-3 hidden mt-2">
        <label class="block">
            <div class="text-xs text-gray-400 mb-1">Upload Video</div>
            <div class="flex items-center gap-2 bg-gray-800 rounded-lg px-3 py-2 cursor-pointer hover:bg-gray-700 transition">
                <i class="fas fa-video text-maroon"></i>
                <span class="text-sm text-gray-300 truncate" id="reply-video-filename-{{ post.id }}">No file selected</span>
                <input type="file" name="video" accept="video/*" class="hidden" id="reply-video-upload-{{ post.id }}">
            </div>
        </label>
    </div>

    <div id="reply-docs-attachment-{{ post.id }}" class="mb-3 hidden mt-2">
        <label class="block">
            <div class="text-xs text-gray-400 mb-1">Upload Document</div>
            <div class="flex items-center gap-2 bg-gray-800 rounded-lg px-3 py-2 cursor-pointer hover:bg-gray-700 transition">
                <i class="fas fa-file-alt text-maroon"></i>
                <span class="text-sm text-gray-300 truncate" id="reply-docs-filename-{{ post.id }}">No file selected</span>
                <input type="file" name="docs" accept=".pdf,.doc,.docx,.ppt,.pptx" class="hidden" id="reply-docs-upload-{{ post.id }}">
            </div>
        </label>
    </div>

    <div id="reply-link-attachment-{{ post.id }}" class="mb-3 hidden mt-2">
        <div class="text-xs text-gray-400 mb-1">Attach a link</div>
        <input type="url" name="link" placeholder="https://example.com"
               class="w-full bg-gray-800 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-maroon placeholder-gray-500"
               id="reply-link-input-{{ post.id }}">
    </div>
</form>
<script src="{% static 'js/reply_form.js' %}"></script>
