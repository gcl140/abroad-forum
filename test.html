<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preloader Example</title>
  <style>
    /* Preloader container */
    #preloader {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #f9fafb; /* subtle background */
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    /* Optional spinner */
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #ddd;
      border-top: 4px solid #4f46e5;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="shortcut icon" href="{% static 'images/fav.png' %}" type="image/x-icon">
  <!-- Google Fonts - Karla -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sen:wght@400..800&display=swap" rel="stylesheet">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
  <!-- Preloader -->
  <div id="preloader">
    <div class="spinner"></div>
  </div>

  <!-- Your content -->
  <div style="padding:2rem;">
    <h1>Page Content</h1>
    <p>This will show after everything has loaded.</p>
  </div>

  <script>
    // Remove preloader when page is fully loaded
    window.addEventListener("load", function() {
      document.getElementById("preloader").style.display = "none";
    });
  </script>
</body>
</html>
