{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found | ForumAbroad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" href="{% static 'images/fav.png' %}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background-color: #010203;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .brand {
      font-size: 1.25rem;
      font-weight: 800;
      color: #800000;
      letter-spacing: -0.5px;
      margin-bottom: 3rem;
    }
    .code {
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 800;
      line-height: 1;
      color: #800000;
      margin-bottom: 1rem;
    }
    .headline {
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 700;
      color: #f3f4f6;
      margin-bottom: 0.75rem;
    }
    .subtext {
      color: #9ca3af;
      font-size: 1rem;
      max-width: 440px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: #800000;
      color: #ffffff;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      text-decoration: none;
      transition: background-color 0.2s ease, transform 0.15s ease;
    }
    .btn-home:hover {
      background-color: #660000;
      transform: translateY(-1px);
    }
    .divider {
      width: 48px;
      height: 3px;
      background-color: #800000;
      border-radius: 2px;
      margin: 1.5rem auto;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="brand">ForumAbroad</div>

  <div class="code">404</div>
  <div class="divider"></div>
  <h1 class="headline">Page not found</h1>
  <p class="subtext">
    This page doesn't exist or may have been moved. If you were following a link, it might be outdated.
  </p>

  <a href="/" class="btn-home">
    <i class="fas fa-arrow-left"></i>
    Back to Home
  </a>

</body>
</html>
