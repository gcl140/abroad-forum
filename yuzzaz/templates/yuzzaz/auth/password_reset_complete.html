{% extends 'yuzzaz/auth/auth-base.html' %}
{% load static %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="w-full max-w-md">

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-[#CBD0D8] overflow-hidden">
    <div class="p-8 text-center">

      <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
        <i class="fas fa-check-circle text-green-600 text-xl"></i>
      </div>

      <h2 class="text-xl font-semibold text-[#333D51]">Password Reset Complete</h2>

      <div class="mt-4 space-y-2 text-sm text-[#aab0bc]">
        <p>Your password has been set.</p>
        <p>Thank you for using our service!</p>
      </div>

      <a
        href="{% url 'login' %}"
        class="mt-6 inline-block w-full py-2.5 px-4 rounded-lg bg-[#D3AC2B] hover:bg-[#b89420] text-white text-sm font-semibold transition-colors"
      >
        Sign In
      </a>

    </div>
  </div>

</div>
{% endblock %}
