{% extends "discussion/base.html" %}
{% load static %}
{% block title %}Questions & Answers{% endblock %}
{% block content %}
            <!-- Sort Options -->
    <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-2">
                    <i class="fas fa-fire text-maroon"></i>
                    <h2 class="font-bold text-lg">Hot Questions</h2>
                </div>
        <div class="hidden md:flex flex-wrap gap-2 text-sm font-medium">
                <button class="px-4 py-1.5 rounded-full bg-gradient-to-r from-gray-800 to-gray-700 text-gray-300 hover:from-gray-700 hover:to-gray-600 transition duration-200">
                  <a href="{% url 'questions' %}?filter=latest" class="hover:underline hover:text-maroon hover:font-bold">
                    Latest
                  </a>
                </button>
                <button class="px-4 py-1.5 rounded-full bg-gradient-to-r from-maroon to-gray-700 text-white shadow-md hover:from-gray-700 hover:to-maroon transition duration-200">
                  <a href="{% url 'questions' %}?filter=top" class="hover:underline hover:text-maroon hover:font-bold">
                    Top
                  </a>
                </button>
                <button class="px-4 py-1.5 rounded-full bg-gradient-to-r from-gray-800 to-gray-700 text-gray-300 hover:from-gray-700 hover:to-gray-600 transition duration-200">
                  <a href="{% url 'questions' %}?filter=controversial" class="hover:underline hover:text-maroon hover:font-bold">
                    Controversial
                  </a>
                </button>
        </div>

        <select 
          class="md:hidden px-4 py-1.5 rounded-full bg-gradient-to-r from-maroon to-gray-700 text-white shadow-md hover:from-gray-700 hover:to-maroon transition duration-200"
          onchange="location.href='?filter=' + this.value.toLowerCase();"
        >
          <option disabled selected>Sort by</option>
          <option value="recent">Latest</option>
          <option value="top">Top</option>
          <option value="controversial">Controversial</option>
        </select>
</div>
<div id="questions-container">
{% include "partials/thequestions.html" %}
</div>
            <!-- Load More Button -->

{% if posts.has_next %}
            <div class="text-center my-8">
                <button 
                hx-get="?page={{ posts.next_page_number }}" 
                hx-trigger="click" 
                hx-target="#questions-container" 
                hx-swap="beforeend"
                class="px-6 py-2 bg-gray-800 hover:bg-gray-700 rounded-full font-medium">
                    Load More Questions
                </button>
            </div>
            {% endif %}

            {% endblock %}
